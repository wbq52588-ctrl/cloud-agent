name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

concurrency:
  group: cloud-agent-worker-deploy
  cancel-in-progress: true

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: 575925e90470099c65d8a2733c2c0d75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install --global wrangler@4.80.0

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy
