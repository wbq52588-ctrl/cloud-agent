<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Agent Console</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260326i" />
  </head>
  <body>
    <div id="auth-overlay" class="auth-overlay hidden">
      <div class="auth-card">
        <p class="eyebrow">Protected Access</p>
        <h2>输入访问口令</h2>
        <p class="header-note">这个站点已开启基础鉴权，输入口令后才能使用。</p>
        <label>
          访问口令
          <input id="access-password" type="password" placeholder="请输入访问口令" />
        </label>
        <div class="composer-actions">
          <span id="auth-status" class="status-text">等待验证</span>
          <button id="auth-submit" class="primary-button" type="button">进入控制台</button>
        </div>
      </div>
    </div>

    <div id="mobile-sidebar-backdrop" class="mobile-sidebar-backdrop hidden"></div>

    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <div class="brand">
          <div class="brand-top">
            <div>
              <p class="eyebrow">Cloud Agent</p>
              <h1>Model Console</h1>
            </div>
            <button id="sidebar-toggle" type="button" class="ghost-button">折叠</button>
          </div>
          <button id="new-chat-button" class="primary-button">新建会话</button>
        </div>
        <div class="sidebar-section">
          <p class="section-title">会话</p>
          <div id="session-list" class="session-list"></div>
        </div>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div class="chat-header-main">
            <div class="mobile-actions">
              <button id="sidebar-toggle-mobile" type="button" class="ghost-button">会话栏</button>
            </div>
            <div>
              <p class="eyebrow">Multi Model Agent</p>
              <h2 id="chat-title">请选择或新建一个会话</h2>
              <p class="header-note">消息区会独立滚动，发送后立即显示占位回复，可随时停止等待。</p>
            </div>
          </div>
          <div class="controls">
            <label>
              模型提供方
              <select id="provider">
                <option value="gemini">Gemini</option>
                <option value="openai">OpenAI</option>
                <option value="zhipu">GLM / Zhipu</option>
                <option value="vps">VPS 控制</option>
              </select>
            </label>
            <label>
              模型
              <select id="model"></select>
            </label>
          </div>
        </header>

        <section class="transcript-shell">
          <section id="message-list" class="message-list">
            <div class="empty-state">
              <h3>开始第一轮对话</h3>
              <p>发出消息后会先显示你的消息和助手占位卡片，不用再盯着页面干等。</p>
            </div>
          </section>
        </section>

        <form id="chat-form" class="composer">
          <div class="composer-top">
            <div class="quick-actions">
              <button type="button" class="quick-chip" data-prompt="帮我写一份 VPS 部署检查清单">VPS 检查清单</button>
              <button type="button" class="quick-chip" data-prompt="分析一下这个报错并给我修复思路">分析报错</button>
              <button type="button" class="quick-chip" data-prompt="帮我把这段需求整理成开发任务列表">整理需求</button>
            </div>
            <div class="tool-row">
              <label class="upload-box compact-label">
                <span>附件</span>
                <input
                  id="file-input"
                  type="file"
                  multiple
                  accept="image/*,.txt,.md,.json,.csv,.log,.py,.js,.ts,.tsx,.jsx,.html,.css,.yml,.yaml,.xml,.sh"
                />
              </label>
              <label class="system-prompt compact-label">
                <span>系统提示词</span>
                <textarea id="system-prompt" rows="2" placeholder="例如：你是一个中文运维助手。"></textarea>
              </label>
            </div>
          </div>
          <div id="attachment-list" class="attachment-list"></div>
          <label class="message-box">
            <span>发送消息</span>
            <textarea id="user-message" rows="3" placeholder="输入你的问题..." required></textarea>
          </label>
          <div class="composer-actions">
            <span id="status-text" class="status-text">服务就绪，按 Ctrl/Cmd + Enter 可发送</span>
            <div class="action-row">
              <button id="stop-button" type="button" class="ghost-button hidden">停止等待</button>
              <button id="logout-button" type="button" class="ghost-button">退出登录</button>
              <button id="send-button" type="submit" class="primary-button">发送</button>
            </div>
          </div>
        </form>
      </main>
    </div>

    <script src="/static/app.js?v=20260326i"></script>
  </body>
</html>
