services:
  cloud-agent:
    build: .
    container_name: cloud-agent
    restart: always
    env_file:
      - .env
    ports:
      - "18000:10000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
