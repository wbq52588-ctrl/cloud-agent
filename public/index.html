<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <title>Codex Workspace</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260402a" />
  </head>
  <body>
    <div id="auth-overlay" class="auth-overlay hidden">
      <div class="auth-card">
        <p class="eyebrow">Protected Access</p>
        <h2>输入访问口令</h2>
        <p class="header-note">这个站点已开启基础鉴权，输入口令后才能使用。</p>
        <label>
          访问口令
          <input id="access-password" type="password" placeholder="请输入访问口令" />
        </label>
        <div class="composer-actions">
          <span id="auth-status" class="status-text">等待验证</span>
          <button id="auth-submit" class="primary-button" type="button">进入控制台</button>
        </div>
      </div>
    </div>

    <div id="identity-overlay" class="auth-overlay hidden">
      <div class="auth-card">
        <p class="eyebrow">User Login</p>
        <h2>输入用户 ID</h2>
        <p class="header-note">当前还不能自动获取企业微信身份时，先手动输入你的 userid 进入专属会话空间。</p>
        <label>
          用户 ID
          <input id="identity-userid" type="text" placeholder="例如：zhangsan" />
        </label>
        <div class="composer-actions">
          <span id="identity-status" class="status-text">等待登录</span>
          <button id="identity-submit" class="primary-button" type="button">进入工作台</button>
        </div>
      </div>
    </div>

    <div id="mobile-sidebar-backdrop" class="mobile-sidebar-backdrop hidden"></div>
    <div id="sheet-backdrop" class="sheet-backdrop hidden"></div>
    <div id="dialog-backdrop" class="sheet-backdrop hidden"></div>

    <div class="app-shell">
        <aside id="sidebar" class="sidebar">
          <div class="brand">
            <div class="brand-top">
              <div class="sidebar-brand">
                <span class="sidebar-brand-mark empty-title-mark" aria-hidden="true"></span>
                <p class="eyebrow">Workspace</p>
              </div>
              <button id="sidebar-toggle" type="button" class="sidebar-toggle-pill" aria-label="收起会话栏">
                <span></span>
                <span></span>
              </button>
            </div>
          <div class="mobile-sidebar-search">
            <input id="session-search" type="text" placeholder="搜索历史对话" />
          </div>
          <button id="mobile-new-chat-button" type="button" class="mobile-new-chat-button">
            <span class="mobile-new-chat-icon">+</span>
            <span>发起新对话</span>
          </button>
        </div>
        <div class="sidebar-section">
          <p class="section-title">最近对话</p>
          <div id="session-list" class="session-list"></div>
        </div>
      </aside>

      <main class="chat-panel">
        <button id="sidebar-rail-toggle" type="button" class="icon-button sidebar-rail-toggle hidden" aria-label="展开会话栏">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <header class="chat-header">
          <div class="chat-header-main">
            <div class="desktop-provider-chip">
              <span class="empty-title-mark" aria-hidden="true"></span>
              <span class="desktop-provider-name">Codex</span>
            </div>

            <h2 id="chat-title" class="desktop-chat-title">Codex</h2>

            <div class="avatar-menu-shell">
              <button id="avatar-menu-toggle" type="button" class="mobile-avatar" aria-label="当前账号菜单">AI</button>
              <div id="avatar-menu" class="avatar-menu hidden" aria-hidden="true">
                <div id="current-user-card" class="avatar-menu-user hidden">
                  <span class="avatar-menu-user-label">当前用户</span>
                  <strong id="current-user-id">未识别</strong>
                </div>
                <button id="logout-button" type="button" class="avatar-menu-item">退出登录</button>
              </div>
            </div>

            <div class="mobile-topbar">
              <button id="sidebar-toggle-mobile" type="button" class="icon-button mobile-nav-button" aria-label="打开会话栏">
                <span class="mobile-nav-line" aria-hidden="true"></span>
                <span class="mobile-nav-line" aria-hidden="true"></span>
                <span class="mobile-nav-line" aria-hidden="true"></span>
              </button>
              <div class="mobile-topbar-title">
                <span class="empty-title-mark mobile-topbar-mark" aria-hidden="true"></span>
                <span id="mobile-provider-title">Codex</span>
              </div>
            </div>

          </div>

          <div class="controls">
            <label>
              模型提供方
              <select id="provider">
                <option value="codex" selected>Codex</option>
                <option value="gemini">Gemini</option>
              </select>
            </label>
            <label>
              模型
              <select id="model">
                <option value="codex" selected>Codex</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
              </select>
            </label>
          </div>
        </header>

        <section class="transcript-shell">
          <section id="message-list" class="message-list">
            <div class="empty-state">
              <h3><span class="empty-title-mark" aria-hidden="true"></span>需要我为你做些什么？</h3>
              <div class="empty-prompts">
                <button type="button" class="welcome-action" data-prompt="帮我分析一段报错，先给结论再给排查方向">分析报错</button>
                <button type="button" class="welcome-action" data-prompt="帮我整理一个需求，把目标、范围和风险讲清楚">整理需求</button>
                <button type="button" class="welcome-action" data-prompt="帮我解释一段代码，讲清楚它在做什么和可能的风险">解释代码</button>
                <button type="button" class="welcome-action" data-prompt="帮我写一个清晰可执行的方案，适合直接落地">生成方案</button>
                <button type="button" class="welcome-action" data-prompt="我们随便聊聊，你自然一点回答就好">随便聊聊</button>
              </div>
            </div>
          </section>
        </section>

        <form id="chat-form" class="composer">
          <textarea id="system-prompt" class="hidden" rows="2" placeholder="例如：你是一个中文运维助手。"></textarea>

          <div id="attachment-list" class="attachment-list hidden"></div>

          <div class="mobile-composer-shell">
            <div class="mobile-input-shell">
              <div class="mobile-text-entry">
                <textarea id="user-message" rows="1" placeholder="输入你的问题，直接开始" aria-label="输入消息"></textarea>
              </div>
              <button id="send-button" type="submit" class="round-send-button" aria-label="发送">
                <span class="send-label" aria-hidden="true">发送</span>
                <span class="send-glyph" aria-hidden="true"></span>
              </button>
            </div>
            <button id="stop-button" type="button" class="round-tool-button hidden">停止</button>
          </div>

          <div class="composer-actions desktop-only">
            <span id="status-text" class="status-text">服务就绪，按 Ctrl/Cmd + Enter 可发送</span>
          </div>
        </form>
      </main>
    </div>

    <select id="provider-mobile" class="hidden"></select>
    <select id="model-mobile" class="hidden"></select>
    <textarea id="system-prompt-mobile" class="hidden" rows="4" placeholder="例如：你是一个中文运维助手。"></textarea>

    <input
      id="file-input"
      class="hidden"
      type="file"
      multiple
      accept=".txt,.md,.json,.csv,.log,.py,.js,.ts,.tsx,.jsx,.html,.css,.yml,.yaml,.xml,.sh"
    />

    <div id="delete-dialog" class="confirm-dialog hidden" aria-hidden="true">
      <div class="confirm-card">
        <p class="eyebrow">删除会话</p>
        <h3 id="delete-dialog-title">确认删除这个会话？</h3>
        <p id="delete-dialog-copy" class="header-note">删除后无法恢复。</p>
        <div class="confirm-actions">
          <button id="delete-cancel-button" type="button" class="ghost-button">取消</button>
          <button id="delete-confirm-button" type="button" class="primary-button danger-button">确认删除</button>
        </div>
      </div>
    </div>

    <script src="/static/app.js?v=20260402a"></script>

</body>
</html>
